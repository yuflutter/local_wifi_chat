<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключенные устройства</title>
    <link rel="stylesheet" href="/static/devices.css">
</head>
<body>
    <div class="container">
        <h1>📱 Подключенные устройства</h1>
        <table>
            <tr><th>IP адрес</th><th>MAC адрес</th><th>Имя устройства</th></tr>
            {{range .Devices}}
            <tr><td>{{.IP}}</td><td>{{.MAC}}</td><td>{{.Hostname}}</td></tr>
            {{end}}
        </table>
        <div class="back-link"><a href="/">← Вернуться в чат</a></div>
    </div>
</body>
</html>
